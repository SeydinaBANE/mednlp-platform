name: CD — Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
      canary_weight:
        description: "Initial canary traffic % (1-20)"
        required: false
        default: "5"

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  gate-check:
    name: Pre-deployment gate
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "deploy" ]; then
            echo "ERROR: Confirmation must be 'deploy', got '${{ inputs.confirm }}'"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run unit tests (must pass before production deploy)
        run: uv run pytest tests/unit/ -v --no-cov -q

  deploy-production:
    name: Deploy to Production (canary → full)
    needs: gate-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production  # requires manual approval in GitHub Environments

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build & push production image
        run: |
          docker build -f docker/api.Dockerfile \
            -t gcr.io/$GCP_PROJECT_ID/mednlp-api:$IMAGE_TAG \
            -t gcr.io/$GCP_PROJECT_ID/mednlp-api:prod \
            .
          docker push gcr.io/$GCP_PROJECT_ID/mednlp-api:$IMAGE_TAG
          docker push gcr.io/$GCP_PROJECT_ID/mednlp-api:prod

      - name: Run migration
        run: |
          gcloud run jobs execute mednlp-migrate-prod \
            --region $GCP_REGION \
            --wait \
            --quiet || echo "Migration job not configured, skipping"

      - name: Deploy API (no traffic — canary staging)
        run: |
          gcloud run deploy mednlp-api-prod \
            --image gcr.io/$GCP_PROJECT_ID/mednlp-api:$IMAGE_TAG \
            --region $GCP_REGION \
            --platform managed \
            --set-env-vars ENV=production \
            --set-secrets "OPENROUTER_API_KEY=openrouter-api-key:latest,SECRET_KEY=app-secret-key-prod:latest" \
            --min-instances 2 \
            --max-instances 50 \
            --cpu 4 \
            --memory 4Gi \
            --no-traffic \
            --quiet

      - name: Route ${{ inputs.canary_weight }}% canary traffic
        run: |
          CANARY=${{ inputs.canary_weight }}
          gcloud run services update-traffic mednlp-api-prod \
            --region $GCP_REGION \
            --to-revisions LATEST=$CANARY

      - name: Monitor canary for 5 minutes
        run: |
          echo "Monitoring canary for 5 minutes..."
          sleep 300
          URL=$(gcloud run services describe mednlp-api-prod \
            --region $GCP_REGION \
            --format 'value(status.url)')
          curl -sf "$URL/health" || (echo "Canary health check failed — rolling back" && exit 1)

      - name: Shift 100% traffic to new revision
        run: |
          gcloud run services update-traffic mednlp-api-prod \
            --region $GCP_REGION \
            --to-latest

      - name: Verify full rollout
        run: |
          URL=$(gcloud run services describe mednlp-api-prod \
            --region $GCP_REGION \
            --format 'value(status.url)')
          curl -sf "$URL/health"
          echo "Production deploy complete: $URL"

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$ICON Production deploy $STATUS: \`$GITHUB_SHA\`\"}"

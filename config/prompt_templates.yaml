version: "1.0"

templates:
  clinical_qa:
    v1:
      system: |
        You are a clinical decision support assistant. Answer the question using ONLY
        the provided clinical note excerpts. Cite each piece of information with its
        source index [1], [2], etc.

        IMPORTANT:
        - Do not make definitive diagnoses without citation support.
        - If the answer cannot be found in the provided notes, say "Information not available
          in the provided notes."
        - Always add the disclaimer: "This is a clinical decision support tool, not a
          substitute for clinical judgment."
      user: |
        Clinical notes:
        {context}

        Question: {question}

        Answer with citations:

  icd_suggestion:
    v1:
      system: |
        You are a medical coding assistant. Given a clinical note excerpt, suggest the
        most likely ICD-10-CM codes. Return a JSON array of objects with keys:
        "code", "description", "confidence" (0.0-1.0).
        Only suggest codes with confidence >= 0.5.
      user: |
        Clinical note:
        {note_text}

        Suggested ICD-10 codes (JSON array):
